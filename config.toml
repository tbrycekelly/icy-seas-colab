publishdir = "public"
static = "/static"
builddrafts = false
baseurl = "https://icyseascolab.io"
canonifyurls = false
theme = ["hugo-shortcode-roneo-collection", "hugo-academic-group"]
title = "Icy Seas Co-Lab"
math = true
copyright = "&copy; Icy Seas Co-Laboratory LLC, 2026"
pygmentsOptions = "linenos=table"
rssURI = "index.xml"
ignoreFiles = ["\\.psd$"]

[taxonomies]
category = "categories"
tag = "tags"

[markup]
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3
  [markup.goldmark]
    [markup.goldmark.parser]
      attribute = true
    [markup.goldmark.renderer]
      unsafe = true

[params]
  description = "Scientific data systems for the field, the lab, and the long-term record."
  author = "Thomas Bryce Kelly"
  email = "tkelly@icyseascolab.io"
  address = "762 Lancaster Drive, Fairbanks, AK 99712"
  phone = "(844) 429-7327"
  slogan = "Scientific data systems built for the field, the lab, and the long-term record."
  slogan_text = "Oceanographic expertise. Practical software. Reproducible science."
  custom_css = ["portfolio.css"]
  asset_version = "20260713-2"

  [[params.logo]]
    image = "favicon.png"
    link = "/"

